<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ATLAS - Login</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .login-card {
      width: 100%;
      max-width: 420px;
      padding: 32px !important;
    }
    
    .login-card h1 {
      font-size: 1.8rem;
      margin-bottom: 4px;
      text-align: center;
    }
    
    .login-card > p:nth-of-type(1) {
      font-size: 0.95rem;
      text-align: center;
      margin-bottom: 4px;
      color: var(--muted);
    }
    
    .login-card > p:nth-of-type(2) {
      text-align: center !important;
      margin-bottom: 24px !important;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <main class="card login-card">
      <h1>🎓 ATLAS</h1>
      <p>Plataforma Educativa Integrada</p>
      <p style="color: var(--muted); font-size: 0.9rem; margin-bottom: 24px;">Accede a tu plataforma educativa para gestionar cursos, tareas y recursos.</p>
      
      <div class="success-message" id="successMessage">
        ✓ Credenciales válidas. Entrando...
      </div>
      
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input 
            id="email" 
            name="email" 
            type="email" 
            autocomplete="email" 
            placeholder="tu@email.com"
            required 
          />
          <div class="error-message" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input 
            id="password" 
            name="password" 
            type="password" 
            autocomplete="current-password" 
            placeholder="Ingresa tu contraseña"
            required 
            minlength="6"
          />
          <div class="error-message" id="passwordError"></div>
        </div>

        <div class="form-group">
          <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; margin-bottom: 0;">
            <input type="checkbox" id="rememberMe" name="rememberMe" style="width: auto; margin: 0;" />
            Recuérdame en este dispositivo
          </label>
        </div>

        <button type="submit" style="width: 100%; padding: 12px; font-size: 1rem; margin-top: 8px;">Entrar</button>
      </form>
      
      <p style="color: var(--muted); font-size: 0.85rem; margin-top: 16px; text-align: center;">
        ¿Olvidaste tu contraseña? <a href="#" style="color: var(--accent); text-decoration: underline;">Recupérala aquí</a>
      </p>
      <p style="color: var(--muted); font-size: 0.85rem; margin-top: 8px; text-align: center;">
        ¿No tienes cuenta? <a href="#" style="color: var(--accent); text-decoration: underline;">Regístrate</a>
      </p>
    </main>
  </div>

  <script src="/static/login.js"></script>
</body>
</html>
